<body>

        <div class="links">
            <a href="index.html">Voos</a>

        </div>
    </nav>

    <div class="container-central">
        <main class="contact-card">
            <h2>Fale Conosco</h2>
            <p class="subtitle">Preencha o formulário abaixo e nossa equipe responderá em breve.</p>

            <form id="form-contato" action="enviar.php" method="post">
                
                <div class="input-group">
                    <label for="nomesobrenome">Nome e sobrenome</label>
                    <input type="text" id="nomesobrenome" class="input-padrao" name="nome" placeholder="Digite seu nome completo" required>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="input-padrao" name="email" placeholder="seu-email@dominio.com" required>
                </div>

                <div class="input-group">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" class="input-padrao" name="telefone" placeholder="(00) 00000-0000" required>
                </div>

                <div class="input-group">
                    <label for="mensagem">Mensagem</label>
                    <textarea id="mensagem" class="input-padrao" name="mensagem" rows="6" placeholder="Escreva sua mensagem aqui..." required></textarea>
                </div>

                <div class="radio-group">
                    <p class="group-title">Como prefere o nosso contato?</p>
                    <div class="radio-options">
                        <label for="radio-email" class="radio-label">
                            <input type="radio" name="contato" value="email" id="radio-email" checked> Email
                        </label>
                        <label for="radio-telef" class="radio-label">
                            <input type="radio" name="contato" value="telefone" id="radio-telef"> Telefone
                        </label>
                        <label for="radio-whatsapp" class="radio-label">
                            <input type="radio" name="contato" value="whatsapp" id="radio-whatsapp"> Whatsapp
                        </label>
                    </div>
                </div>

                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="novidades" checked> 
                        <span>Gostaria de receber nossas novidades por email?</span>
                    </label>
                </div>

                <div class="form-actions">
                    <input type="submit" value="Enviar formulário" class="btn-primary">
                </div>
                
            </form>
            
        </main>
        
    </div>
