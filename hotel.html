<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotéis e Pousadas</title>
    <link rel="stylesheet" href="css/hotel.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <h2>ViajarBR ✈️</h2>
        <div class="links">
            <a href="index.html">Voos</a>
            <a href="hotel.html">Hotéis</a>
            <a href="pacote.html">Pacotes</a>
            <a href="carros.html">Carros</a>
            <a href="contato.html">Contato</a>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>Hotéis & Pousadas 🏨</h1>
            <p>Acomodações com os melhores preços em todo o Brasil</p>
        </div>
    </header>

    <main class="container">
        <section class="search-box">
            <div class="input-group">
                <label>📍 CIDADE OU HOTEL</label>
                <input type="text" id="city-input" placeholder="Ex: Fortaleza, Salvador...">
            </div>
            <div class="input-group">
                <label>📅 CHECK-IN</label>
                <input type="date" id="checkin-input">
            </div>
            <div class="input-group">
                <label>📅 CHECK-OUT</label>
                <input type="date" id="checkout-input">
            </div>
            <div class="input-group">
                <button id="search-btn" class="btn-primary">Buscar</button>
            </div>
        </section>

        <section id="results-container" class="results-grid">
            </section>
    </main>
    <script src="src/Js/hotels.js"></script>
</body>
</html>
